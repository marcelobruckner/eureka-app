<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Concluir tarefa | eureka-app</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Concluir tarefa</h1>
            <p class="text-muted mb-0" th:text="${tarefa.nome}"></p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary"
               th:href="@{|/disciplinas/${tarefa.disciplina.id}/tarefas|}">Voltar</a>
            <a class="btn btn-outline-secondary" th:href="@{/inicio}">Dashboard</a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="mb-4">
                        <div class="small text-muted">Disciplina</div>
                        <div class="fw-semibold" th:text="${tarefa.disciplina.nome}"></div>
                        <div class="small text-muted mt-2">
                            <span th:text="${'Criada em ' + tarefa.dataCriacao}"></span>
                            <span th:text="${' | Prevista: ' + tarefa.dataPrevistaEntrega}"></span>
                            <span th:text="${' | Status: ' + tarefa.status}"></span>
                        </div>
                    </div>

                    <div class="alert alert-warning" th:if="${tarefa.status.name() != 'PENDENTE'}">
                        Esta tarefa ja foi entregue e nao pode ser reaberta no MVP.
                    </div>

                    <form th:if="${tarefa.status.name() == 'PENDENTE'}"
                          th:action="@{|/tarefas/${tarefa.id}/concluir|}"
                          th:object="${concluirTarefaForm}"
                          method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label" for="dataEntrega">Data de entrega</label>
                            <input id="dataEntrega" type="date" class="form-control" th:field="*{dataEntrega}">
                            <div class="text-danger small" th:errors="*{dataEntrega}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">Concluir</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
