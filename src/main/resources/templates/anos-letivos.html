<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anos letivos | eureka-app</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row g-4">
        <div class="col-12 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">Cadastrar ano letivo</h1>
                    <form th:action="@{/anos-letivos}" th:object="${anoLetivoForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label" for="ano">Ano</label>
                            <input id="ano" type="number" class="form-control" th:field="*{ano}">
                            <div class="text-danger small" th:errors="*{ano}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                        <a class="btn btn-link" th:href="@{/inicio}">Voltar</a>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12 col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="h4 mb-3">Anos letivos do aluno</h2>
                    <div class="list-group">
                        <div class="list-group-item d-flex justify-content-between align-items-center"
                             th:each="anoLetivo : ${anosLetivos}">
                            <div>
                                <div class="fw-semibold" th:text="${anoLetivo.ano}"></div>
                            </div>
                            <a class="btn btn-outline-primary btn-sm"
                               th:href="@{|/anos-letivos/${anoLetivo.id}/disciplinas|}">Disciplinas</a>
                        </div>
                        <div class="list-group-item text-muted" th:if="${#lists.isEmpty(anosLetivos)}">
                            Nenhum ano letivo cadastrado.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
