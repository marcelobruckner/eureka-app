<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tarefas | eureka-app</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1" th:text="${disciplina.nome}"></h1>
            <p class="text-muted mb-0">
                <span th:text="${disciplina.anoLetivo.ano}"></span>
                <span> - tarefas cadastradas</span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/inicio}">Dashboard</a>
            <a class="btn btn-outline-secondary" th:href="@{/anos-letivos}">Anos letivos</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">Cadastrar tarefa</h2>
                    <form th:action="@{/tarefas}" th:object="${tarefaForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" th:field="*{disciplinaId}">

                        <div class="mb-3">
                            <label class="form-label" for="nome">Nome</label>
                            <input id="nome" type="text" class="form-control" th:field="*{nome}">
                            <div class="text-danger small" th:errors="*{nome}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="dataPrevistaEntrega">Data prevista de entrega</label>
                            <input id="dataPrevistaEntrega" type="date" class="form-control"
                                   th:field="*{dataPrevistaEntrega}">
                            <div class="text-danger small" th:errors="*{dataPrevistaEntrega}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">Tarefas cadastradas</h2>
                    <div class="list-group">
                        <div class="list-group-item" th:each="tarefa : ${tarefas}">
                            <div class="d-flex justify-content-between align-items-start gap-3">
                                <div>
                                    <div class="fw-semibold" th:text="${tarefa.nome}"></div>
                                    <div class="small text-muted">
                                        <span th:text="${'Criada em ' + tarefa.dataCriacao}"></span>
                                        <span th:text="${' | Prevista: ' + tarefa.dataPrevistaEntrega}"></span>
                                    </div>
                                    <div class="small"
                                         th:text="${tarefa.dataEntrega != null ? 'Entregue em ' + tarefa.dataEntrega : (tarefa.vencida ? 'Pendente e vencida' : 'Pendente')}"></div>
                                </div>
                                <div class="text-end">
                                    <span class="badge"
                                          th:classappend="${tarefa.status.name() == 'PENDENTE'} ? ' text-bg-warning' : (${tarefa.status.name() == 'ENTREGUE'} ? ' text-bg-success' : ' text-bg-danger')"
                                          th:text="${tarefa.status}"></span>
                                    <div class="mt-2">
                                        <a class="btn btn-sm btn-outline-primary"
                                           th:if="${tarefa.status.name() == 'PENDENTE'}"
                                           th:href="@{|/tarefas/${tarefa.id}/concluir|}">Concluir</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="list-group-item text-muted" th:if="${#lists.isEmpty(tarefas)}">
                            Nenhuma tarefa cadastrada para esta disciplina.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
