<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Disciplinas | eureka-app</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Disciplinas por ano letivo</h1>
            <p class="text-muted mb-0" th:text="${anoSelecionado != null ? anoSelecionado.ano : ''}"></p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/anos-letivos}">Anos letivos</a>
            <a class="btn btn-outline-secondary" th:href="@{/inicio}">Dashboard</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">Cadastrar disciplina</h2>
                    <form th:action="@{/disciplinas}" th:object="${disciplinaForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" th:field="*{anoSelecionadoId}">

                        <div class="mb-3">
                            <label class="form-label" for="nome">Nome</label>
                            <input id="nome" type="text" class="form-control" th:field="*{nome}">
                            <div class="text-danger small" th:errors="*{nome}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="anoLetivoId">Ano letivo</label>
                            <select id="anoLetivoId" class="form-select" th:field="*{anoLetivoId}">
                                <option value="">Selecione</option>
                                <option th:each="anoLetivo : ${anosLetivos}"
                                        th:value="${anoLetivo.id}"
                                        th:text="${anoLetivo.ano}"></option>
                            </select>
                            <div class="text-danger small" th:errors="*{anoLetivoId}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">Disciplinas cadastradas</h2>
                    <div class="list-group">
                        <div class="list-group-item" th:each="disciplina : ${disciplinas}">
                            <div class="d-flex justify-content-between align-items-start gap-2">
                                <div>
                                    <div class="fw-semibold" th:text="${disciplina.nome}"></div>
                                    <small class="text-muted"
                                           th:text="${anoSelecionado != null ? anoSelecionado.ano : ''}"></small>
                                </div>
                                <a class="btn btn-sm btn-outline-primary"
                                   th:href="@{|/disciplinas/${disciplina.id}/tarefas|}">Tarefas</a>
                            </div>
                        </div>
                        <div class="list-group-item text-muted" th:if="${#lists.isEmpty(disciplinas)}">
                            Nenhuma disciplina cadastrada para este ano.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
