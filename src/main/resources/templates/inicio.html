<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio | eureka-app</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4 p-md-5 d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <h1 class="h3 mb-2">Area do aluno</h1>
                <p class="text-muted mb-0">Autenticado como <strong th:text="${usuarioLogado}"></strong>.</p>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <a class="btn btn-outline-primary" th:href="@{/anos-letivos}">Anos letivos</a>
                <a class="btn btn-outline-primary"
                   th:if="${anoSelecionado != null}"
                   th:href="@{|/anos-letivos/${anoSelecionado.id}/disciplinas|}">Disciplinas</a>
                <span class="btn btn-outline-primary disabled" th:if="${anoSelecionado == null}">Disciplinas</span>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-secondary">Sair</button>
                </form>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12 col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">Anos letivos</h2>
                    <div class="list-group">
                        <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                           th:each="anoLetivo : ${anosLetivos}"
                           th:href="@{|/inicio?anoLetivoId=${anoLetivo.id}|}"
                           th:classappend="${anoSelecionado != null and anoSelecionado.id == anoLetivo.id} ? ' active' : ''">
                            <span th:text="${anoLetivo.ano}"></span>
                            <span class="badge bg-secondary rounded-pill" th:text="${#lists.size(disciplinas)}"
                                  th:if="${anoSelecionado != null and anoSelecionado.id == anoLetivo.id}"></span>
                        </a>
                        <div class="list-group-item text-muted" th:if="${#lists.isEmpty(anosLetivos)}">
                            Nenhum ano letivo cadastrado.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-8">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                        <h2 class="h5 mb-0">Disciplinas</h2>
                        <span class="text-muted" th:if="${anoSelecionado != null}"
                              th:text="${'Ano ' + anoSelecionado.ano}"></span>
                    </div>

                    <div class="row g-3">
                        <div class="col-12 col-md-6" th:each="disciplina : ${disciplinas}">
                            <div class="border rounded-3 p-3 bg-white">
                                <div class="fw-semibold" th:text="${disciplina.nome}"></div>
                                <small class="text-muted"
                                       th:text="${anoSelecionado != null ? anoSelecionado.ano : ''}"></small>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="alert alert-light border mb-0" th:if="${#lists.isEmpty(disciplinas)}">
                                Nenhuma disciplina cadastrada para o ano selecionado.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
