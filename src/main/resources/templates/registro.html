<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro | eureka-app</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 mb-2">Cadastro de aluno</h1>
                    <p class="text-muted mb-4">Crie seu acesso para acompanhar as tarefas escolares.</p>

                    <div class="alert alert-danger" th:if="${erroGeral}" th:text="${erroGeral}"></div>

                    <form th:action="@{/registro}" th:object="${cadastroAlunoForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome</label>
                            <input id="nome" type="text" class="form-control" th:field="*{nome}">
                            <div class="text-danger small" th:errors="*{nome}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="usuario" class="form-label">Usuario</label>
                            <input id="usuario" type="text" class="form-control" th:field="*{usuario}">
                            <div class="text-danger small" th:errors="*{usuario}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" th:field="*{email}">
                            <div class="text-danger small" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="senha" class="form-label">Senha</label>
                            <input id="senha" type="password" class="form-control" th:field="*{senha}">
                            <div class="text-danger small" th:errors="*{senha}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                    </form>

                    <div class="mt-4 text-center">
                        <a th:href="@{/login}">Voltar para o login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
