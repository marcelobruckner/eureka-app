<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio | eureka-app</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                        <div>
                            <h1 class="h3 mb-2">Area do aluno</h1>
                            <p class="text-muted mb-0">Fase 3 concluida: autenticacao e acesso protegido.</p>
                        </div>
                        <form th:action="@{/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-outline-secondary">Sair</button>
                        </form>
                    </div>

                    <hr class="my-4">

                    <p class="mb-2">Usuario autenticado:</p>
                    <p class="fs-5 fw-semibold" th:text="${usuarioLogado}"></p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
